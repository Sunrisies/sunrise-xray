name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动触发时使用的版本号（例如 v0.1.0），仅用于命名产物，不会创建 git tag'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            apt_packages: musl-tools
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install apt packages (Linux)
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -e
          pkg="sunrise-xray-${{ steps.vars.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/$pkg"
          cp "target/${{ matrix.target }}/release/sunrise-xray" "dist/$pkg/"
          cp README.md USAGE.md LICENSE "dist/$pkg/" 2>/dev/null || true
          tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
          (cd dist && shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256")

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $pkg = "sunrise-xray-${{ steps.vars.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sunrise-xray.exe" "dist/$pkg/"
          Copy-Item README.md, USAGE.md, LICENSE "dist/$pkg/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$pkg/*" -DestinationPath "dist/$pkg.zip"
          $hash = (Get-FileHash "dist/$pkg.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $pkg.zip" | Out-File -FilePath "dist/$pkg.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunrise-xray-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
